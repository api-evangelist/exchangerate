aid: exchangerate
name: ExchangeRate-API
description: >
  ExchangeRate-API is a currency exchange rate REST API providing real-time and
  historical exchange rates for 165 currencies across 200 countries. Operating
  since 2010, the service delivers reliable currency conversion data via simple
  HTTP GET requests, supporting both URL-embedded and Bearer token authentication.
  It offers a free tier with 1,500 monthly requests and daily updates, plus paid
  plans with hourly or 5-minute update frequencies and higher quotas. The API
  features over 99.99% measured uptime backed by multi-AZ AWS infrastructure and
  Cloudflare CDN, with historical data available back to 1990.
